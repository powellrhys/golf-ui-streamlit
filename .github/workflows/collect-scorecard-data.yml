name: Collect Scorecard Data
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/collect-scorecard-data.yml"
      - 'backend/**'
      - 'shared/**'
  push:
    branches:
      - main
    paths:
      - ".github/workflows/collect-scorecard-data.yml"
      - 'backend/**'
      - 'shared/**'
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: update-scorecard-data
  cancel-in-progress: false

jobs:
  collect_scorecard_data:
    name: Collect Scorecard Data
    runs-on: ubuntu-latest

    steps:
      # Check out codebase
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # Install Poetry
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry==1.7.1

      # Configure and install Chrome
      - name: Set up Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # Configure ChromeDriver
      - name: Set up ChromeDriver
        run: |
          sudo apt-get install -y chromium-chromedriver
          chromedriver --version

      # Install project dependencies via Poetry
      - name: Install dependencies
        run: |
          poetry install --no-interaction

      # Run data collection script - Scorecard
      - name: Run Data Collection Script
        env:
          chromedriver_path: "/usr/bin/chromedriver"
          blob_storage_connection_string: ${{ secrets.blob_storage_connection_string }}
          golf_course_name: ${{ secrets.golf_course_name }}
          round_site_player_name: "Rhys"
          round_site_base_url: ${{ vars.round_site_base_url }}
          round_site_username: ${{ secrets.round_site_username }}
          round_site_password: ${{ secrets.round_site_password }}
        run: poetry run python -m backend.collect_scorecard_data
